openapi: 3.0.3

info:
  title: Simple Poll API
  version: 1.0.0
  description: REST API for user authentication and poll management.

servers:
  - url: http://localhost:3000
    description: Local development server

tags:
  - name: Health
    description: Health check endpoints
  - name: Auth
    description: Authentication and session handling
  - name: Users
    description: User management
  - name: Polls
    description: Poll creation and voting

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  responses:
    BadRequest:
      description: Invalid request data
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    Unauthorized:
      description: Authentication required or invalid token
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    Conflict:
      description: Resource conflict (e.g. username already exists)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    ServerError:
      description: Unexpected server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          example: "Something went wrong"
      required: [error]

    OkResponse:
      type: object
      properties:
        ok:
          type: boolean
          example: true
      required: [ok]

    Consent:
      type: object
      properties:
        tosAcceptedAt:
          type: string
          format: date-time
        tosVersion:
          type: string
        privacyAcceptedAt:
          type: string
          format: date-time
        privacyVersion:
          type: string
      required:
        - tosAcceptedAt
        - tosVersion
        - privacyAcceptedAt
        - privacyVersion

    UserPublic:
      type: object
      properties:
        id:
          type: string
          example: "256375c5-7f8c-4661-a83e-a5838b363196"
        username:
          type: string
          example: "test1"
        createdAt:
          type: string
          format: date-time
        consent:
          $ref: "#/components/schemas/Consent"
      required: [id, username, createdAt, consent]

    CreateUserRequest:
      type: object
      properties:
        username:
          type: string
          minLength: 3
          example: "test1"
        password:
          type: string
          minLength: 6
          example: "supersecret123"
        tosAccepted:
          type: boolean
          example: true
      required: [username, password, tosAccepted]

    UpdateMeRequest:
      type: object
      description: Only include fields that should be updated.
      properties:
        username:
          type: string
          example: "newname"
        password:
          type: string
          example: "newsecret123"
      additionalProperties: false

    LoginRequest:
      type: object
      properties:
        username:
          type: string
          example: "test1"
        password:
          type: string
          example: "supersecret123"
      required: [username, password]

    LoginResponse:
      type: object
      properties:
        token:
          type: string
          example: "jwt.token.here"
        user:
          $ref: "#/components/schemas/UserPublic"
      required: [token, user]

    PollOption:
      type: object
      properties:
        id:
          type: string
          example: "opt_1"
        text:
          type: string
          example: "Pizza"
        votes:
          type: integer
          minimum: 0
          example: 0
      required: [id, text, votes]

    Poll:
      type: object
      properties:
        id:
          type: string
          example: "poll_123"
        title:
          type: string
          example: "What should we eat?"
        options:
          type: array
          items:
            $ref: "#/components/schemas/PollOption"
        createdAt:
          type: string
          format: date-time
        ownerId:
          type: string
          nullable: true
        ownerUsername:
          type: string
          example: "test1"
      required: [id, title, options, createdAt, ownerId, ownerUsername]

    CreatePollRequest:
      type: object
      properties:
        title:
          type: string
          example: "What should we eat?"
        options:
          type: array
          items:
            type: string
            example: "Pizza"
      required: [title, options]

    ListPollsResponse:
      type: object
      properties:
        polls:
          type: array
          items:
            $ref: "#/components/schemas/Poll"
      required: [polls]

    CreatePollResponse:
      type: object
      properties:
        poll:
          $ref: "#/components/schemas/Poll"
      required: [poll]

paths:
  /health:
    get:
      tags: [Health]
      summary: Health check
      responses:
        "200":
          description: Server is running
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "500":
          $ref: "#/components/responses/ServerError"

  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: Login user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Successful login
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/auth/me:
    get:
      tags: [Auth]
      summary: Get current user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserPublic"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/auth/logout:
    post:
      tags: [Auth]
      summary: Logout user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Successfully logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/users:
    post:
      tags: [Users]
      summary: Create a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserPublic"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/Conflict"

  /api/v1/users/me:
    patch:
      tags: [Users]
      summary: Update current user
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMeRequest"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserPublic"
        "401":
          $ref: "#/components/responses/Unauthorized"

    delete:
      tags: [Users]
      summary: Delete current user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/polls:
    get:
      tags: [Polls]
      summary: Get all polls
      responses:
        "200":
          description: List of polls
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListPollsResponse"

    post:
      tags: [Polls]
      summary: Create a new poll
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePollRequest"
      responses:
        "201":
          description: Poll created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatePollResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"