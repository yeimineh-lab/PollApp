<!doctype html>
<html lang="no">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Simple Poll - Users</title>
    <link rel="stylesheet" href="./app.css" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#2563eb" />
    <script type="module" src="./app.mjs"></script>
  </head>

  <body>
    <div class="container">
      <header>
        <div>
          <h1 id="pageHeading"></h1>
          <p id="pageSubtitle" class="subtitle">Log in or create an account to continue.</p>
        </div>
        <span class="badge" data-i18n="localBadge"><span class="dot"></span> local:3000</span>
      </header>

      <main>
        <section id="authView" class="auth-view">
          <div class="auth-shell">
            <section class="card auth-card">
              <div class="auth-tabs">
                <button id="showLoginBtn" class="tab-btn active" type="button">Login</button>
                <button id="showSignupBtn" class="tab-btn" type="button">Create account</button>
              </div>

              <div id="loginPanel" class="auth-panel">
                <user-edit mode="login"></user-edit>
              </div>

              <div id="signupPanel" class="auth-panel hidden">
                <user-create></user-create>
              </div>
            </section>
          </div>
        </section>

        <section id="appView" class="app-view hidden">
          <div class="grid">
            <section class="card col-12">
              <user-edit mode="profile"></user-edit>
            </section>

            <section class="card col-12">
              <h2>Registered Users</h2>
              <ul id="usersList" class="users-list"></ul>
            </section>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
