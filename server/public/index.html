<!doctype html>
<html lang="no">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Simple Poll - Users</title>
    <link rel="stylesheet" href="./app.css" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#2563eb" />
    <script type="module" src="./app.mjs"></script>
  </head>

  <body>
    <div class="container">
      <header>
        <div>
          <h1 data-i18n="mainTitle">Users</h1>
          <p class="subtitle" data-i18n="subtitle">
            Relative API paths (e.g. <code>/api/v1/users</code>). Token is stored in memory only.
          </p>
        </div>
        <span class="badge" data-i18n="localBadge"><span class="dot"></span> local:3000</span>
      </header>

      <main class="grid">
        <section class="card col-4">
          <user-create></user-create>
        </section>

        <section class="card col-4">
          <user-edit></user-edit>
        </section>

        <section class="card col-4">
          <user-delete></user-delete>
        </section>

        <section class="card col-12">
          <h2 data-i18n="statusTitle">Status</h2>
          <div id="status" class="status" aria-live="polite"></div>
        </section>
      </main>
    </div>
  </body>
</html>
